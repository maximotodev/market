name: Deploy Relay

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/deploy-relay.yml'
      - 'deploy-simple/relay/**'
      - 'deploy-simple/caddyfiles/Caddyfile.staging'
      - 'deploy-simple/caddyfiles/Caddyfile.production'
  workflow_dispatch:
    inputs:
      stage:
        description: 'Which relay environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - all

jobs:
  build-relay:
    name: Build Relay
    runs-on: ubuntu-latest
    outputs:
      relay_version: ${{ steps.version.outputs.relay_version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set relay version
        id: version
        run: echo "relay_version=${GITHUB_SHA::12}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download relay dependencies
        run: |
          cd deploy-simple/relay
          go mod download

      - name: Test relay app
        run: |
          cd deploy-simple/relay
          go test ./...

      - name: Build relay binary
        env:
          RELAY_VERSION: ${{ steps.version.outputs.relay_version }}
        run: |
          mkdir -p relay-package
          cd deploy-simple/relay
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w -X main.version=${RELAY_VERSION}" \
            -o ../../relay-package/market-relay ./cmd/market-relay

      - name: Assemble relay package
        run: |
          cp deploy-simple/relay/install-relay.sh relay-package/install-relay.sh
          cp deploy-simple/relay/systemd/market-relay.service relay-package/market-relay.service
          cp deploy-simple/relay/config/staging.env relay-package/staging.env
          cp deploy-simple/relay/config/production.env relay-package/production.env
          cp deploy-simple/caddyfiles/Caddyfile.staging relay-package/Caddyfile.staging
          cp deploy-simple/caddyfiles/Caddyfile.production relay-package/Caddyfile.production

      - name: Upload relay artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-package
          path: relay-package/
          retention-days: 1

  deploy-staging:
    name: Deploy Relay to Staging
    needs: build-relay
    if: github.event_name == 'push' || github.event.inputs.stage == 'staging' || github.event.inputs.stage == 'all'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Download relay artifact
        uses: actions/download-artifact@v4
        with:
          name: relay-package
          path: relay-package/

      - name: Prepare staging relay dir
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          script: |
            rm -rf /tmp/relay-deploy
            mkdir -p /tmp/relay-deploy

      - name: Upload staging relay package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          source: 'relay-package/*'
          target: '/tmp/relay-deploy'
          strip_components: 1

      - name: Install relay on staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          script: |
            set -e
            chmod +x /tmp/relay-deploy/install-relay.sh
            /tmp/relay-deploy/install-relay.sh staging /tmp/relay-deploy
            grep -q 'auctionsdev\.plebeian\.market' /tmp/relay-deploy/Caddyfile.staging
            CADDY_BACKUP="$(mktemp)"
            sudo cp /etc/caddy/Caddyfile "$CADDY_BACKUP" 2>/dev/null || true
            if ! { sudo cp /tmp/relay-deploy/Caddyfile.staging /etc/caddy/Caddyfile && \
              (sudo caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || \
               sudo caddy start --config /etc/caddy/Caddyfile --adapter caddyfile); }; then
              echo "Caddy reload failed, restoring previous config"
              if [[ -f "$CADDY_BACKUP" ]]; then
                sudo cp "$CADDY_BACKUP" /etc/caddy/Caddyfile || true
                sudo caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || true
              fi
              exit 1
            fi
            grep -q 'auctionsdev\.plebeian\.market' /etc/caddy/Caddyfile
            rm -f "$CADDY_BACKUP"

      - name: Verify staging relay
        env:
          RELAY_VERSION: ${{ needs.build-relay.outputs.relay_version }}
        run: |
          sleep 5
          curl -sf -H 'Accept: application/nostr+json' https://relay.staging.plebeian.market/ | jq .
          echo "✅ Staging relay deployment verified (${RELAY_VERSION})"

  deploy-production:
    name: Deploy Relay to Production
    needs: build-relay
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.stage == 'production' || github.event.inputs.stage == 'all')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download relay artifact
        uses: actions/download-artifact@v4
        with:
          name: relay-package
          path: relay-package/

      - name: Prepare production relay dir
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script: |
            rm -rf /tmp/relay-deploy
            mkdir -p /tmp/relay-deploy

      - name: Upload production relay package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          source: 'relay-package/*'
          target: '/tmp/relay-deploy'
          strip_components: 1

      - name: Install relay on production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script: |
            set -e
            chmod +x /tmp/relay-deploy/install-relay.sh
            /tmp/relay-deploy/install-relay.sh production /tmp/relay-deploy
            CADDY_BACKUP="$(mktemp)"
            sudo cp /etc/caddy/Caddyfile "$CADDY_BACKUP" 2>/dev/null || true
            if ! { sudo cp /tmp/relay-deploy/Caddyfile.production /etc/caddy/Caddyfile && \
              (sudo caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || \
               sudo caddy start --config /etc/caddy/Caddyfile --adapter caddyfile); }; then
              echo "Caddy reload failed, restoring previous config"
              if [[ -f "$CADDY_BACKUP" ]]; then
                sudo cp "$CADDY_BACKUP" /etc/caddy/Caddyfile || true
                sudo caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || true
              fi
              exit 1
            fi
            rm -f "$CADDY_BACKUP"

      - name: Verify production relay
        env:
          RELAY_VERSION: ${{ needs.build-relay.outputs.relay_version }}
        run: |
          sleep 5
          curl -sf -H 'Accept: application/nostr+json' https://relay.plebeian.market/ | jq .
          echo "✅ Production relay deployment verified (${RELAY_VERSION})"
